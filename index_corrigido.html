<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ObraPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; }
    h1 { color: #333; }
    button { padding: 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>ObraPro 🚀</h1>

<button onclick="exportExcel('pedidos-todos')">Exportar Pedidos</button>

<script>
const PERMS = { admin: { exportar: true } };
const session = { role: 'admin' };

const DB = {
  obras: [{id:1,nome:'Obra A',resp:'João',orc:10000,gasto:5000}],
  pedidos: [
    {id:1,obraId:1,desc:'Cimento',cat:'Material',forn:'Fornecedor X',qtd:10,val:50,status:'Aprovado',solicitante:'Carlos',data:'2026-01-01',empresaId:1}
  ]
};

function getPedidos(){ return DB.pedidos; }
function getObras(){ return DB.obras; }

function fmtN(n){ return Number(n).toFixed(2); }

function showToast(msg){ alert(msg); }

function exportExcel(tipo, extra) {
  if(!PERMS[session.role].exportar){
    showToast('Sem permissão para exportar!');
    return;
  }

  const wb = XLSX.utils.book_new();
  const now = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');

  if(tipo === 'pedidos-todos') {
    const rows = [['ID','Obra','Descrição','Categoria','Fornecedor','Qtd','Valor','Total','Status','Solicitante','Data']];
    getPedidos().forEach(p=>{
      const o = DB.obras.find(x=>x.id===p.obraId);
      rows.push([p.id,o?o.nome:'?',p.desc,p.cat,p.forn,p.qtd,fmtN(p.val),fmtN(p.qtd*p.val),p.status,p.solicitante,p.data]);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Pedidos');
    XLSX.writeFile(wb, `Pedidos_${now}.xlsx`);
  }

  showToast('Excel gerado!');
}
</script>

</body>
</html>
